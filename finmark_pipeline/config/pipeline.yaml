project:
  name: finmark-data-pipeline
  stage: milestone-2-minimum-viable

sources:
  event_logs: ./data/raw/event_logs.csv
  marketing_summary: ./data/raw/marketing_summary.csv
  trend_report: ./data/raw/trend_report.csv

outputs:
  cleaned_events_csv: ./data/processed/cleaned_event_logs.csv
  cleaned_events_parquet: ./data/processed/cleaned_event_logs.parquet
  pipeline_summary_json: ./data/processed/pipeline_summary.json

cleaning:
  drop_duplicates: true
  fill_unknown_strings: true
  enforce_lowercase_columns: true
  trim_whitespace: true